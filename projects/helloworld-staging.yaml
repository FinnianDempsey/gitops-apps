apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helloworld-staging
  annotations:
    argo.octopus.com/project.local-mac: "argo"
    argo.octopus.com/environment.local-mac: "staging"
    argo.octopus.com/image-replace-paths.local-mac: "docker.io/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
  finalizers:
    - resources-finalizer.argocd.argoproj.io/foreground
spec:
  project: default
  source:
    path: manifests/helloworld-staging/
    repoURL: https://github.com/FinnianDempsey/gitops-apps.git
    targetRevision: HEAD
    helm:
      valueFiles:
        - values.yaml
  destination:
    name: in-cluster
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - PrunePropagationPolicy=foreground
      - Replace=false
      - PruneLast=false
      - Validate=true
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=false
      - ServerSideApply=true
      - RespectIgnoreDifferences=false
